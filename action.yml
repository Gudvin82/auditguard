name: 'AuditGuard Security Audit'
description: 'Автоматический технический и кибербезопасность-аудит сайта: TLS, CVE, Security Headers, DNS, Shodan'
author: 'AuditGuard'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  url:
    description: 'URL сайта для аудита'
    required: true
  profile:
    description: 'Профиль аудита: technical_first (по умолчанию) или legal_first'
    required: false
    default: 'technical_first'
  fail_on_critical:
    description: 'Завершить с ошибкой при наличии критических уязвимостей'
    required: false
    default: 'true'
  fail_on_high:
    description: 'Завершить с ошибкой при наличии high-уязвимостей'
    required: false
    default: 'false'
  max_wait_seconds:
    description: 'Максимальное время ожидания результата (секунды)'
    required: false
    default: '300'

outputs:
  grade:
    description: 'Trust Grade (A+, A, B, C, D или ❗)'
  score:
    description: 'Числовой score (0-100)'
  critical_count:
    description: 'Количество критических уязвимостей'
  high_count:
    description: 'Количество high-уязвимостей'
  audit_id:
    description: 'UUID аудита (для получения SARIF: /api/audits/{id}/sarif)'
  report_url:
    description: 'Ссылка на полный отчёт'

runs:
  using: 'composite'
  steps:
    - name: Run AuditGuard Audit
      shell: bash
      run: |
        set -euo pipefail

        URL="${{ inputs.url }}"
        PROFILE="${{ inputs.profile }}"
        MAX_WAIT="${{ inputs.max_wait_seconds }}"
        BASE="https://auditguard.ru/api"

        echo "🔍 Запуск аудита: $URL (профиль: $PROFILE)"

        LAUNCH=$(curl -sf -X POST "$BASE/audits" \
          -H "Content-Type: application/json" \
          -d "{\"url\":\"$URL\",\"profile\":\"$PROFILE\",\"agreeToTerms\":true,\"hasLegalBasis\":true}")

        AUDIT_ID=$(echo "$LAUNCH" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        echo "Audit ID: $AUDIT_ID"
        echo "audit_id=$AUDIT_ID" >> $GITHUB_OUTPUT

        ELAPSED=0
        while [ $ELAPSED -lt $MAX_WAIT ]; do
          sleep 5
          ELAPSED=$((ELAPSED + 5))
          RESULT=$(curl -sf "$BASE/audits/$AUDIT_ID")
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "  [$ELAPSED s] status: $STATUS"

          if [ "$STATUS" = "completed" ]; then
            eval $(echo "$RESULT" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        s = d.get('summary', {})
        print(f'GRADE={d.get(\"grade\",\"?\")}')
        print(f'SCORE={d.get(\"score\",0)}')
        print(f'CRITICAL={s.get(\"critical\",0)}')
        print(f'HIGH={s.get(\"high\",0)}')
        print(f'MEDIUM={s.get(\"medium\",0)}')
        print(f'LOW={s.get(\"low\",0)}')
        ")

            echo ""
            echo "════════════════════════════════════════"
            echo "  Trust Grade : $GRADE  (Score: $SCORE/100)"
            echo "  Findings    : critical=$CRITICAL, high=$HIGH, medium=$MEDIUM, low=$LOW"
            echo "  Report      : https://auditguard.ru/report/$AUDIT_ID"
            echo "  SARIF       : https://auditguard.ru/api/audits/$AUDIT_ID/sarif"
            echo "════════════════════════════════════════"

            echo "grade=$GRADE"             >> $GITHUB_OUTPUT
            echo "score=$SCORE"             >> $GITHUB_OUTPUT
            echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high_count=$HIGH"         >> $GITHUB_OUTPUT
            echo "report_url=https://auditguard.ru/report/$AUDIT_ID" >> $GITHUB_OUTPUT

            FAIL=0
            if [ "${{ inputs.fail_on_critical }}" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
              echo "❌ Обнаружены критические уязвимости ($CRITICAL шт.) — аудит не пройден"
              FAIL=1
            fi
            if [ "${{ inputs.fail_on_high }}" = "true" ] && [ "$HIGH" -gt 0 ]; then
              echo "❌ Обнаружены high-уязвимости ($HIGH шт.) — аудит не пройден"
              FAIL=1
            fi
            if [ $FAIL -eq 0 ]; then
              echo "✅ Аудит пройден (Grade: $GRADE)"
            fi
            exit $FAIL
          fi

          if [ "$STATUS" = "failed" ]; then
            echo "❌ Ошибка аудита"
            exit 1
          fi
        done

        echo "❌ Таймаут ожидания ($MAX_WAIT сек)"
        exit 1
