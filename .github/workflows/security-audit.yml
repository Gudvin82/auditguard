name: Security Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL сайта для аудита (переопределяет vars.AUDITGUARD)'
        required: false
        type: string
  schedule:
    - cron: '0 9 * * 1'   # Каждый понедельник 9:00 UTC

jobs:
  security-audit:
    name: AuditGuard Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Run AuditGuard Audit
        uses: Gudvin82/auditguard@v1
        with:
          url: ${{ inputs.url || vars.AUDITGUARD }}
          fail_on_critical: true
